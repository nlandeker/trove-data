name: Ingest catalog

on:
  schedule:
    # Daily at 03:00 UTC (low-traffic window)
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
          # ponytail: check out the data branch directly; no need for a separate fetch step

      - name: Run ingest pipeline
        env:
          REBRICKABLE_API_KEY: ${{ secrets.REBRICKABLE_API_KEY }}
          BRICKSET_API_KEY: ${{ secrets.BRICKSET_API_KEY }}
        run: python3 ingest.py

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          mv catalog.json data/catalog.json
          git add data/catalog.json
          git diff --cached --quiet || git commit -m "chore: refresh catalog $(date -u +%Y-%m-%d)"
          git push
